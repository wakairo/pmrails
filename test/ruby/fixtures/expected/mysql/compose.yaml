services:
  rails-app:
    environment:
      BINDING: 0.0.0.0
      CAPYBARA_SERVER_PORT: 45678
      SELENIUM_HOST: selenium
      DATABASE_URL: mysql2://root@db/
    depends_on:
      selenium: {condition: service_healthy}
      db: {condition: service_healthy}

  selenium:
    image: selenium/standalone-chromium
    shm_size: 2g
    healthcheck:
      interval: 2s
      timeout: 5s
      retries: 5
      test: ["CMD", "/opt/bin/check-grid.sh", "--host", "0.0.0.0", "--port", "4444"]

  db:
    image: mysql/mysql-server:8.0
    volumes:
    - pmrails-mysql-data:/var/lib/mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'true'
      MYSQL_ROOT_HOST: "%"
    healthcheck:
      interval: 2s
      timeout: 5s
      retries: 10
      test:
      - CMD
      - mysqladmin
      - ping
      - "-h"
      - 127.0.0.1
      - "-u"
      - root

volumes:
  pmrails-mysql-data:
