services:
  rails-app:
    environment:
      BINDING: 0.0.0.0
      CAPYBARA_SERVER_PORT: 45678
      SELENIUM_HOST: selenium
      DATABASE_URL: postgres://postgres:postgres@db/
    depends_on:
      selenium: {condition: service_healthy}
      db: {condition: service_healthy}

  selenium:
    image: selenium/standalone-chromium
    shm_size: 2g
    healthcheck:
      interval: 2s
      timeout: 5s
      retries: 5
      test: ["CMD", "/opt/bin/check-grid.sh", "--host", "0.0.0.0", "--port", "4444"]

  db:
    image: postgres:17
    volumes:
    - pmrails-postgresql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      interval: 2s
      timeout: 5s
      retries: 10
      test:
      - CMD
      - pg_isready
      - "-U"
      - postgres
    shm_size: 128mb
volumes:
  pmrails-postgresql-data:
